<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>플로깅 지표 대시보드</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet">
<style>
  :root{--ink:#183947;--muted:#7392a1;--sky:#2ba7c7;--line:#e6eff4;--sans:'Pretendard',system-ui,sans-serif}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);color:var(--ink);background:#eaf4fa;min-height:100vh;padding:24px 16px}
  .wrap{max-width:560px;margin:0 auto}
  h1{font-size:20px;font-weight:800;margin-bottom:4px}
  .sub{font-size:12px;color:var(--muted);margin-bottom:18px}
  .auth{background:#fff;border-radius:18px;padding:18px;box-shadow:0 4px 14px rgba(28,86,116,.1);display:flex;gap:8px}
  .auth input{flex:1;border:1.5px solid var(--line);border-radius:12px;padding:10px 13px;font-family:var(--sans);font-size:14px;outline:none}
  .auth input:focus{border-color:var(--sky)}
  .auth button{font-family:var(--sans);font-size:14px;font-weight:800;color:#fff;background:var(--sky);border:none;border-radius:12px;padding:10px 18px;cursor:pointer}
  .card{background:#fff;border-radius:18px;padding:16px 18px;box-shadow:0 4px 14px rgba(28,86,116,.08);margin-top:14px}
  .card h2{font-size:14px;font-weight:800;margin-bottom:10px;display:flex;align-items:center;gap:6px}
  .row{display:flex;justify-content:space-between;align-items:baseline;padding:7px 0;border-bottom:1px solid #f2f7fa;font-size:13px}
  .row:last-child{border:none}
  .row .k{color:var(--muted);font-weight:600}
  .row .v{font-weight:800;font-size:16px}
  .row .v.hl{color:var(--sky);font-size:19px}
  .err{background:#fff0ee;color:#c0483c;border-radius:14px;padding:12px 14px;font-size:13px;font-weight:600;margin-top:14px;display:none}
  .upd{font-size:11px;color:var(--muted);text-align:right;margin-top:12px}
</style>
</head>
<body>
<div class="wrap">
  <h1>📊 30초 해변 플로깅 — 성과 지표</h1>
  <div class="sub">서포터즈 발표용 · 데이터 활성화 정량 지표 (실시간 집계)</div>
  <div class="auth">
    <input id="key" type="password" placeholder="통계 접근 키 (STATS_KEY)">
    <button id="go">조회</button>
  </div>
  <div class="err" id="err"></div>
  <div id="out"></div>
</div>
<script>
const API_URL = "https://beach-plogging-flash-game.wanghope.workers.dev";
// 강조(파란 큰 글씨)할 키 — Worker JSON의 키와 글자 하나까지 같아야 한다(문자열 일치로 찾는다)
const HL = new Set(['데이터 전환율 % (플레이어→MEIS 클릭)','Q1 인지 변화율 %','Q2 인지 변화율 %','완주율 %','재플레이율 % (총 플레이 중)','공유율 % (플레이어→공유)',
  'Q1 정답률 %','Q2 정답률 %','Q3 정답률 %','퀴즈 참여율 % (방문→응답)']);
const TITLES = {funnel:'🔻 유입 퍼널', engagement:'🎮 참여도', data_activation:'📈 데이터 활성화 (핵심)', quiz:'💡 퀴즈 정답률 · 참여', reaction:'💬 사용자 반응 · 인지 변화'};
async function load(){
  const key=document.getElementById('key').value.trim();
  const err=document.getElementById('err'), out=document.getElementById('out');
  err.style.display='none'; out.innerHTML='';
  if(!API_URL){err.textContent='stats.html 상단의 API_URL을 먼저 설정하세요.';err.style.display='block';return;}
  let r;
  try{r=await fetch(API_URL+'/stats?key='+encodeURIComponent(key));}catch(e){err.textContent='요청 실패: '+e;err.style.display='block';return;}
  if(!r.ok){err.textContent=r.status===401?'키가 올바르지 않아요.':'오류 '+r.status;err.style.display='block';return;}
  const d=await r.json();
  sessionStorage.setItem('statsKey',key);
  let html='';
  // 여기 없는 섹션은 Worker가 보내도 안 그려진다 — 섹션을 추가하면 이 배열과 TITLES 둘 다 손봐야 한다
  for(const sec of ['funnel','engagement','data_activation','quiz','reaction']){
    if(!d[sec])continue;
    html+='<div class="card"><h2>'+TITLES[sec]+'</h2>';
    for(const [k,v] of Object.entries(d[sec])){
      const disp=v==null?'—':(typeof v==='number'?v.toLocaleString():v)+(k.includes('%')?'%':'');
      html+='<div class="row"><span class="k">'+k.replace(' %','')+'</span><span class="v'+(HL.has(k)?' hl':'')+'">'+disp+'</span></div>';
    }
    html+='</div>';
  }
  html+='<div class="upd">집계 시각: '+new Date(d.updated).toLocaleString('ko-KR')+'</div>';
  out.innerHTML=html;
}
document.getElementById('go').addEventListener('click',load);
document.getElementById('key').addEventListener('keydown',e=>{if(e.key==='Enter')load();});
const saved=sessionStorage.getItem('statsKey');if(saved){document.getElementById('key').value=saved;load();}
</script>
</body>
</html>
